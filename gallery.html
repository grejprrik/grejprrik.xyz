<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <meta content="Photo gallery by grejprrik (Štěpán Pavlica) - photography portfolio" name="description">
    <meta name="keywords"
        content="photography, gallery, photos, portfolio, grejprrik, grejprr, graper, grejprrwashere, puddle_of_cum, primer.fiftyfive, Štěpán Pavlica, Štěpán, Pavlica">
    <meta name="author" content="Štěpán Pavlica">
    <meta name="publisher" content="Štěpán Pavlica">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://grejprrik.xyz/gallery.html">
    <title>Photos | grejprrik</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://cdnjs.cloudflare.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="preload"
        onload='this.onload=null,this.rel="stylesheet"' as="style"><noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    </noscript>
    <style>
        @font-face {
            font-family: "W95FA";
            src: url("fonts/W95FA.otf") format("opentype");
        }

        :root {
            --bg: #008080;
            --win-bg: #c0c0c0;
            --win-border-light: #ffffff;
            --win-border-light-2: #dfdfdf;
            --win-border-dark: #808080;
            --win-border-dark-2: #000000;
            --title-bar-bg: #000080;
            --title-bar-text: #ffffff;
            --text: #000000;
            --accent: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: "W95FA", "MS Sans Serif", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
        }

        .desktop {
            height: calc(100% - 30px);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .window {
            background: var(--win-bg);
            border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            box-shadow: 1px 1px 0 0 var(--win-border-dark-2), inset 1px 1px 0 0 var(--win-border-light-2);
            padding: 2px;
            width: 100%;
            max-width: 1000px;
        }

        .title-bar {
            background: var(--title-bar-bg);
            padding: 3px 5px 3px 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-bar-text {
            color: var(--title-bar-text);
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .title-bar-controls button {
            width: 16px;
            height: 14px;
            background: var(--win-bg);
            border: 1px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            box-shadow: 1px 1px 0 0 var(--win-border-dark-2);
            font-size: 13px; /* Increased from 11px */
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding-bottom: 2px;
            line-height: 1;
        }

        .window-body {
            padding: 15px;
            background: #ffffff;
            margin: 2px;
            border: 2px solid;
            border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            text-align: center;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border: 1px solid var(--win-border-dark);
        }

        .gallery-item .caption {
            font-size: 12px;
            margin-top: 5px;
            word-break: break-word;
        }

        /* Viewer Overlay */
        .viewer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .viewer-overlay.active { display: flex; }

        .viewer-window {
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
        }

        .viewer-content-container {
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            min-width: 200px;
        }

        .viewer-content {
            max-width: 100%;
            max-height: 70vh;
            display: block;
        }

        .viewer-controls {
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            background: var(--win-bg);
        }

        button.win95-btn {
            padding: 5px 15px;
            background: var(--win-bg);
            border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
        }

        button.win95-btn:active {
            border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
            padding: 6px 14px 4px 16px;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: var(--win-bg);
            border-top: 2px solid var(--win-border-light);
            display: flex;
            align-items: center;
            padding: 2px;
            z-index: 1000;
        }

        .start-button {
            height: 24px;
            padding: 0 8px;
            background: var(--win-bg);
            border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 13px;
        }

        .system-tray {
            margin-left: auto;
            background: var(--win-bg);
            border: 2px solid;
            border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
            padding: 0 8px;
            font-size: 13px;
            height: 22px;
            margin-right: 2px;
            display: flex;
            align-items: center;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(192, 192, 192, 0.8);
            border: 2px solid var(--win-border-light);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 2100;
        }

        .nav-arrow.left { left: -50px; }
        .nav-arrow.right { right: -50px; }

        @media (max-width: 800px) {
            .nav-arrow { width: 30px; height: 30px; font-size: 18px; }
            .nav-arrow.left { left: 5px; }
            .nav-arrow.right { right: 5px; }
        }

        .loading-spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-top: 4px solid var(--title-bar-bg);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            position: absolute;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div class="desktop">
        <div class="window">
            <div class="title-bar">
                <div class="title-bar-text">
                    <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" width="16" height="16" alt="">
                    C:\Photos
                </div>
                <div class="title-bar-controls">
                    <button onclick="location.href='/'">×</button>
                </div>
            </div>
            <div class="window-body">
                <h1 id="page-title" style="font-size: 20px; margin-bottom: 15px;">Fotogalerie</h1>
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img alt="Martin" class="thumbnail" data-full="images/martin.webp"
                            data-medium="images/medium/martin.webp" decoding="async" loading="lazy"
                            src="images/thumbs/martin.webp">
                        <p class="caption">Martin. This is my classmate</p>
                    </div>
                    <!-- Placeholders -->
                    <div class="gallery-item placeholder">
                        <div style="aspect-ratio:1; background:#dfdfdf; border:1px dashed #808080; display:flex; align-items:center; justify-content:center; font-size:30px; color:#808080">+</div>
                        <p class="caption placeholder-text">Už brzy...</p>
                    </div>
                    <div class="gallery-item placeholder">
                        <div style="aspect-ratio:1; background:#dfdfdf; border:1px dashed #808080; display:flex; align-items:center; justify-content:center; font-size:30px; color:#808080">+</div>
                        <p class="caption placeholder-text">Už brzy...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Viewer Overlay as a Window -->
    <div class="viewer-overlay" id="photo-viewer">
        <div class="window viewer-window">
            <div class="title-bar">
                <div class="title-bar-text">
                    <img src="https://win98icons.alexmeub.com/icons/png/paint_file-2.png" width="14" height="14" alt="">
                    Image Viewer
                </div>
                <div class="title-bar-controls">
                    <button class="close-btn">×</button>
                </div>
            </div>
            <div class="viewer-content-container">
                <div class="loading-spinner" id="loading-spinner" style="display:none"></div>
                <img alt="" class="viewer-content" id="full-image">
                <div class="nav-arrow left" id="prev-btn">&lsaquo;</div>
                <div class="nav-arrow right" id="next-btn">&rsaquo;</div>
            </div>
            <div class="viewer-controls">
                <button class="win95-btn" id="view-full-btn">Full Quality</button>
                <a href="#" id="download-link" download style="text-decoration:none">
                    <button class="win95-btn">Download</button>
                </a>
            </div>
            <div style="background:var(--win-bg); padding: 5px; font-size:10px; border-top:1px solid #808080" id="image-info"></div>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-button" onclick="location.href='/'">
            <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16" height="16" alt="">
            Start
        </button>
        <div style="width:2px; height:20px; background:#808080; border-right:1px solid #fff; margin:0 5px;"></div>
        <div style="height:24px; padding:0 10px; background:#dfdfdf; border:2px solid; border-color:#808080 #fff #fff #808080; display:flex; align-items:center; font-size:11px; min-width:100px;">
            <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" width="14" height="14" alt="" style="margin-right:5px">
            C:\Photos
        </div>
        <div class="system-tray">
            <div id="clock">12:00 PM</div>
        </div>
    </div>

    <script>
        let isViewingFull = false;
        const translations = {
            cs: {
                page_title: "Fotogalerie",
                click_hint: "(klikni)",
                nav_home: "Domů",
                nav_gallery: "Fotogalerie",
                view_full_text: "Plná kvalita",
                viewing_full_text: "Zobrazeno v plné",
                download_text: "Stáhnout",
                placeholder_text: "Už brzy..."
            },
            en: {
                page_title: "Photo Gallery",
                click_hint: "(click)",
                nav_home: "Home",
                nav_gallery: "Gallery",
                view_full_text: "Full Quality",
                viewing_full_text: "Viewing Full",
                download_text: "Download",
                placeholder_text: "Coming soon..."
            }
        };

        const viewFullBtn = document.getElementById("view-full-btn");

        function setLanguage(lang) {
            const pt = document.getElementById("page-title");
            if (pt) pt.textContent = translations[lang].page_title;
            
            document.querySelectorAll(".placeholder-text").forEach(el => {
                el.textContent = translations[lang].placeholder_text;
            });

            if (viewFullBtn) {
                viewFullBtn.textContent = isViewingFull ? translations[lang].viewing_full_text : translations[lang].view_full_text;
                fullQuality ? viewFullBtn.style.background = "#666" : viewFullBtn.style.background = "";
            }
            
            localStorage.setItem("preferredLang", lang);
        }

        function toggleLanguage() {
            const currentLang = localStorage.getItem("preferredLang") || (navigator.language.startsWith("cs") ? "cs" : "en");
            setLanguage(currentLang === "cs" ? "en" : "cs");
        }

        const thumbnails = document.querySelectorAll(".thumbnail");
        const viewer = document.getElementById("photo-viewer");
        const fullImg = document.getElementById("full-image");
        const downloadLink = document.getElementById("download-link");
        const closeBtn = document.querySelector(".close-btn");
        const prevBtn = document.getElementById("prev-btn");
        const nextBtn = document.getElementById("next-btn");
        const loadingSpinner = document.getElementById("loading-spinner");
        const imageInfo = document.getElementById("image-info");
        let currentIndex = 0;

        async function getFileSize(url) {
            try {
                const response = await fetch(url, { method: "HEAD" });
                const size = response.headers.get("Content-Length");
                if (size) {
                    const bytes = parseInt(size);
                    if (bytes < 1024) return `${bytes} B`;
                    if (bytes < 1048576) return `${(bytes / 1024).toFixed(1)} KB`;
                    return `${(bytes / 1048576).toFixed(2)} MB`;
                }
            } catch (e) { console.log("Could not fetch file size:", e); }
            return "?";
        }

        function updateImageInfo(imgEl, url) {
            imgEl.onload = async function () {
                const w = imgEl.naturalWidth;
                const h = imgEl.naturalHeight;
                const size = await getFileSize(url);
                imageInfo.textContent = `${w} × ${h} px • ${size}`;
                fullImg.style.opacity = 1;
                loadingSpinner.style.display = "none";
            };
        }

        function showImage(index, fullQuality = false) {
            const thumb = thumbnails[index];
            if (!thumb) return;
            
            const mediumUrl = thumb.dataset.medium || thumb.src;
            const fullUrl = thumb.dataset.full || thumb.src;
            const targetUrl = fullQuality ? fullUrl : mediumUrl;
            
            isViewingFull = fullQuality;
            const lang = localStorage.getItem("preferredLang") || (navigator.language.startsWith("cs") ? "cs" : "en");
            
            if (viewFullBtn) {
                viewFullBtn.textContent = fullQuality ? translations[lang].viewing_full_text : translations[lang].view_full_text;
                fullQuality ? viewFullBtn.style.background = "#666" : viewFullBtn.style.background = "";
            }

            loadingSpinner.style.display = "block";
            fullImg.style.opacity = 0.5;

            fullImg.src = targetUrl;
            downloadLink.href = fullUrl;
            updateImageInfo(fullImg, targetUrl);
            
            currentIndex = index;
            index === 0 ? prevBtn.style.display = "none" : prevBtn.style.display = "flex";
            index === thumbnails.length - 1 ? nextBtn.style.display = "none" : nextBtn.style.display = "flex";
        }

        thumbnails.forEach((thumb, index) => {
            thumb.addEventListener("click", () => {
                viewer.classList.add("active");
                showImage(index);
            });
        });

        viewFullBtn.onclick = (e) => {
            e.stopPropagation();
            if (!isViewingFull) showImage(currentIndex, true);
        };

        prevBtn.onclick = (e) => {
            e.stopPropagation();
            if (currentIndex > 0) showImage(currentIndex - 1);
        };

        nextBtn.onclick = (e) => {
            e.stopPropagation();
            if (currentIndex < thumbnails.length - 1) showImage(currentIndex + 1);
        };

        closeBtn.onclick = () => viewer.classList.remove("active");
        viewer.onclick = (e) => { if (e.target === viewer) viewer.classList.remove("active"); };

        document.addEventListener("keydown", (e) => {
            if (viewer.classList.contains("active")) {
                if (e.key === "Escape") viewer.classList.remove("active");
                else if (e.key === "ArrowLeft" && currentIndex > 0) showImage(currentIndex - 1);
                else if (e.key === "ArrowRight" && currentIndex < thumbnails.length - 1) showImage(currentIndex + 1);
            }
        });

        // Clock
        function updateClock() {
            const el = document.getElementById("clock");
            if (el) {
                const now = new Date();
                el.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            }
        }
        setInterval(updateClock, 1000);
        document.addEventListener("DOMContentLoaded", updateClock);

        window.onload = () => {
            const savedLang = localStorage.getItem("preferredLang");
            const browserLang = (navigator.language || navigator.userLanguage).startsWith("cs") ? "cs" : "en";
            setLanguage(savedLang || browserLang);
        };
    </script>
</body>
</html>
