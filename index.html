            --win-border-light: #ffffff;
            --win-border-light-2: #dfdfdf;
            --win-border-dark: #808080;

        * {

            image-rendering: pixelated;

        body, html {
            height: 100%;

        .desktop {
            height: calc(100% - 30px);
            padding: 20px;
            overflow: hidden;

        /* Windows 95 Style Window */
        .window {
            background: var(--win-bg);
            border: 2px solid;
            border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
            box-shadow: 1px 1px 0 0 var(--win-border-dark-2), inset 1px 1px 0 0 var(--win-border-light-2);
            padding: 2px;
            width: 100%;
            max-width: 800px;
            min-width: 220px;
            min-height: 100px;
            margin-bottom: 20px;
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .window.dragging {
            user-select: none;
        }

        .window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            height: 100%;
        }

        .window.maximized .window-body {
            height: calc(100% - 22px);
        }

        .window.minimized {
            display: none;
        }

        .resize-handle {
            position: absolute;
            z-index: 5;
        }

        .resize-handle.n { top: -3px; left: 6px; right: 6px; height: 6px; cursor: ns-resize; }
        .resize-handle.s { bottom: -3px; left: 6px; right: 6px; height: 6px; cursor: ns-resize; }
        .resize-handle.e { top: 6px; right: -3px; bottom: 6px; width: 6px; cursor: ew-resize; }
        .resize-handle.w { top: 6px; left: -3px; bottom: 6px; width: 6px; cursor: ew-resize; }
        .resize-handle.ne { top: -3px; right: -3px; width: 10px; height: 10px; cursor: nesw-resize; }
        .resize-handle.nw { top: -3px; left: -3px; width: 10px; height: 10px; cursor: nwse-resize; }
        .resize-handle.se { bottom: -3px; right: -3px; width: 10px; height: 10px; cursor: nwse-resize; }
        .resize-handle.sw { bottom: -3px; left: -3px; width: 10px; height: 10px; cursor: nesw-resize; }

        .window.maximized .resize-handle {
            display: none;
        }

        .taskbar-context-menu {

    <script>
        const translations = { 
            cs: { studying: "Studuji na", location: "Hodonín, CZ", albums_title: "Alba tohoto týdne", nav_gallery: "Fotogalerie" }, 
            en: { studying: "I study at", location: "Hodonin, Czech Republic", albums_title: "Albums of the Week", nav_gallery: "Gallery" } 
        };

        function setLanguage(langCode) { 
            const lang = translations[langCode] || translations.en;
            const elements = {
                "lang-studying": lang.studying,
                "lang-location": lang.location,
                "lang-albums-title": lang.albums_title,
                "nav-gallery": lang.nav_gallery
            };
            for (const [id, val] of Object.entries(elements)) {
                const el = document.getElementById(id);
                if (el) el.textContent = val;
            }
            localStorage.setItem("preferredLang", langCode);
        }

        function toggleLanguage() { 
            const current = localStorage.getItem("preferredLang") || (navigator.language.startsWith("cs") ? "cs" : "en");
            setLanguage(current === "cs" ? "en" : "cs");
            closeStartMenu();
        }

        function closeStartMenu() {
            document.getElementById("startMenu").classList.remove("active");
            document.getElementById("startButton").classList.remove("active");
        }

        // Last.fm
        async function updateAlbums() {
            try {
                const res = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.gettopalbums&user=grejprrik&api_key=06a3f4e3025d7a27141ecdd8eb59702d&period=7day&limit=4&format=json`);
                const data = await res.json();
                if (!data?.topalbums?.album) return;
                let albums = data.topalbums.album;
                if (!Array.isArray(albums)) albums = [albums];
                renderAlbums(albums);
                localStorage.setItem("lastfm_cache", JSON.stringify(albums));
            } catch (e) {
                console.warn("Last.fm error:", e);
                const cache = localStorage.getItem("lastfm_cache");
                if (cache) renderAlbums(JSON.parse(cache));
            }
        }

        function renderAlbums(albums) {
            const grid = document.querySelector(".music-grid");
            if (!grid) return;
            grid.innerHTML = albums.map(a => {
                const img = a.image.find(i => i.size === "extralarge")?.["#text"] || a.image[a.image.length-1]?.["#text"];
                return img ? `<div class="music-card"><img src="${img}" class="music-cover" title="${a.artist.name} - ${a.name}"></div>` : "";
            }).join("");
        }

        // Clock
        function initClock() {
            const el = document.getElementById("clock");
            const update = () => {
                const now = new Date();
                if (el) {
                    el.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
                    // Strip any stray non-time characters that may precede the clock (e.g. stray ")")
                    el.textContent = el.textContent.replace(/^[^0-9:]*/,'');
                }
            };
            update();
            setInterval(update, 1000);
        }

        // Sounds
        const sndPostal = new Audio("sounds/postal.mp3");
        const sndCS = new Audio("sounds/counterstrike.mp3");
        sndPostal.load();
        sndCS.load();

        function play(s) {
            if (localStorage.getItem("soundsMuted") === "true") return;
            s.currentTime = 0;
            s.play().catch(e => console.log("Audio block:", e));
        }

        // Discord
        let mediaT, elapsedT;
        async function updateDiscord() {
            try {
                const res = await fetch(`https://api.lanyard.rest/v1/users/1382801533279670462`);
                const { data, success } = await res.json();
                if (!success) return;

                document.getElementById("discord-widget-win").style.display = "block";
                initDraggableWindows();
                document.getElementById("discord-avatar-img").src = `https://cdn.discordapp.com/avatars/${data.discord_user.id}/${data.discord_user.avatar}.png?size=80`;
                document.getElementById("discord-username").textContent = data.discord_user.username;
                
                const status = document.getElementById("discord-status-indicator");
                status.textContent = `(${data.discord_status})`;
                status.style.color = {online:"#00aa00", idle:"#aaaa00", dnd:"#aa0000", offline:"#666666"}[data.discord_status];

                let txt = data.discord_status, showM = false;
                const elap = document.getElementById("elapsed-time");
                elap.style.display = "none";

                if (data.spotify) {
                    txt = "Spotify"; showM = true;
                    document.getElementById("media-album-art").src = data.spotify.album_art_url;
                    document.getElementById("media-track").textContent = data.spotify.song;
                    document.getElementById("media-artist").textContent = data.spotify.artist;
                    if (mediaT) clearInterval(mediaT);
                    mediaT = setInterval(() => {
                        const now = Date.now(), s = data.spotify.timestamps.start, e = data.spotify.timestamps.end;
                        const p = Math.min(100, Math.max(0, ((now - s) / (e - s)) * 100));
                        const pb = document.getElementById("progress-bar");
                        if (pb) pb.style.width = `${p}%`;
                        const te = document.getElementById("time-elapsed");
                        const tt = document.getElementById("time-total");
                        if (te) te.textContent = fmt(now - s);
                        if (tt) tt.textContent = fmt(e - s);
                    }, 1000);
                } else if (data.activities?.length) {
                    const act = data.activities[0];
                    txt = act.name;
                    if (act.timestamps?.start) {
                        elap.style.display = "inline";
                        if (elapsedT) clearInterval(elapsedT);
                        elapsedT = setInterval(() => elap.textContent = `[${fmt(Date.now() - act.timestamps.start)} elapsed]`, 1000);
                    }
                }
                document.getElementById("discord-activity").textContent = txt;
                document.getElementById("media-player").classList.toggle("active", showM);
            } catch(e) {}
        }
        const fmt = ms => `${Math.floor(ms/60000)}:${(Math.floor(ms/1000)%60).toString().padStart(2,'0')}`;

        function copyDiscord() {
            navigator.clipboard.writeText("grejprrik.xyz").then(() => {
                let toast = document.querySelector(".copy-toast") || document.createElement("div");
                toast.className = "copy-toast show";
                toast.textContent = "Discord tag copied!";
                document.body.appendChild(toast);
                setTimeout(() => toast.classList.remove("show"), 2500);
            });
            closeStartMenu();
        }

        let zCounter = 10;
        let activeWindowId = null;

        function bringToFront(winEl) {
            zCounter++;
            winEl.style.zIndex = zCounter;
            activeWindowId = winEl.id;
            setActiveTaskbarButton(winEl);
        }

        function isDragEnabled() {
            return window.matchMedia("(min-width: 601px)").matches;
        }

        function getWindowTitle(winEl) {
            return winEl.dataset.title || winEl.querySelector('.title-bar-text')?.textContent.trim() || 'Window';
        }

        function setActiveTaskbarButton(winEl) {
            document.querySelectorAll('.taskbar-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.forWindow === winEl.id);
            });
        }

        function ensureTaskbarButton(winEl) {
            if (!winEl.id) return;
            const list = document.getElementById('taskbarWindows');
            if (!list) return;
            let btn = list.querySelector(`[data-for-window="${winEl.id}"]`);
            if (btn) return btn;

            btn = document.createElement('button');
            btn.className = 'taskbar-item';
            btn.dataset.forWindow = winEl.id;
            btn.type = 'button';
            btn.textContent = getWindowTitle(winEl);
            btn.addEventListener('click', () => {
                if (winEl.classList.contains('minimized')) {
                    restoreWindow(winEl);
                } else if (activeWindowId === winEl.id) {
                    minimizeWindow(winEl);
                } else {
                    bringToFront(winEl);
                }
            });
            list.appendChild(btn);
            return btn;
        }

        function removeTaskbarButton(winEl) {
            const btn = document.querySelector(`[data-for-window="${winEl.id}"]`);
            if (btn) btn.remove();
        }

        function minimizeWindow(winEl) {
            winEl.classList.add('minimized');
            if (activeWindowId === winEl.id) activeWindowId = null;
            const btn = document.querySelector(`[data-for-window="${winEl.id}"]`);
            if (btn) btn.classList.remove('active');
        }

        function restoreWindow(winEl) {
            winEl.classList.remove('minimized');
            bringToFront(winEl);
        }

        function toggleMaximize(winEl) {
            if (winEl.classList.contains('maximized')) {
                winEl.classList.remove('maximized');
                if (winEl.dataset.preLeft !== undefined) {
                    winEl.style.left = winEl.dataset.preLeft;
                    winEl.style.top = winEl.dataset.preTop;
                    winEl.style.width = winEl.dataset.preWidth;
                }
            } else {
                winEl.dataset.preLeft = winEl.style.left;
                winEl.dataset.preTop = winEl.style.top;
                winEl.dataset.preWidth = winEl.style.width || '';
                winEl.classList.add('maximized');
            }
            bringToFront(winEl);
        }

        function closeWindow(winEl) {
            winEl.classList.add('minimized');
            if (activeWindowId === winEl.id) activeWindowId = null;
            removeTaskbarButton(winEl);
        }

        function makeDraggable(winEl) {
            const titleBar = winEl.querySelector('.title-bar');
            if (!titleBar || titleBar.dataset.dragBound === "true") return;
            titleBar.dataset.dragBound = "true";

            let offsetX = 0, offsetY = 0, dragging = false;

            const startDrag = (clientX, clientY) => {
                if (!isDragEnabled() || winEl.classList.contains('maximized')) return false;
                bringToFront(winEl);
                const rect = winEl.getBoundingClientRect();
                const parentRect = winEl.parentElement.getBoundingClientRect();
                offsetX = clientX - rect.left;
                offsetY = clientY - rect.top;
                winEl.style.left = (rect.left - parentRect.left) + 'px';
                winEl.style.top = (rect.top - parentRect.top) + 'px';
                winEl.classList.add('dragging');
                dragging = true;
                return true;
            };

            const moveDrag = (clientX, clientY) => {
                if (!dragging) return;
                const parentRect = winEl.parentElement.getBoundingClientRect();
                let x = clientX - parentRect.left - offsetX;
                let y = clientY - parentRect.top - offsetY;
                x = Math.max(0, Math.min(x, parentRect.width - winEl.offsetWidth));
                y = Math.max(0, Math.min(y, parentRect.height - winEl.offsetHeight));
                winEl.style.left = x + 'px';
                winEl.style.top = y + 'px';
            };

            const endDrag = () => {
                dragging = false;
                winEl.classList.remove('dragging');
            };

            titleBar.addEventListener('mousedown', (e) => {
                if (e.target.closest('.title-bar-controls')) return;
                if (startDrag(e.clientX, e.clientY)) e.preventDefault();
            });
            document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
            document.addEventListener('mouseup', endDrag);

            titleBar.addEventListener('touchstart', (e) => {
                if (e.target.closest('.title-bar-controls')) return;
                const t = e.touches[0];
                startDrag(t.clientX, t.clientY);
            }, { passive: true });
            document.addEventListener('touchmove', (e) => {
                if (!dragging) return;
                const t = e.touches[0];
                moveDrag(t.clientX, t.clientY);
            }, { passive: true });
            document.addEventListener('touchend', endDrag);

            titleBar.addEventListener('dblclick', (e) => {
                if (e.target.closest('.title-bar-controls')) return;
                if (isDragEnabled()) toggleMaximize(winEl);
            });

            winEl.addEventListener('mousedown', () => { if (isDragEnabled()) bringToFront(winEl); });
        }

        function makeResizable(winEl) {
            if (winEl.dataset.resizeBound === "true") return;
            winEl.dataset.resizeBound = "true";

            const edges = ['n', 's', 'e', 'w', 'ne', 'nw', 'se', 'sw'];
            edges.forEach(edge => {
                const handle = document.createElement('div');
                handle.className = 'resize-handle ' + edge;
                winEl.appendChild(handle);

                let startX, startY, startW, startH, startTop, startLeft, resizing = false;

                handle.addEventListener('mousedown', (e) => {
                    if (!isDragEnabled() || winEl.classList.contains('maximized')) return;
                    e.preventDefault();
                    e.stopPropagation();
                    bringToFront(winEl);
                    resizing = true;
                    const rect = winEl.getBoundingClientRect();
                    startX = e.clientX;
                    startY = e.clientY;
                    startW = rect.width;
                    startH = rect.height;
                    startTop = winEl.offsetTop;
                    startLeft = winEl.offsetLeft;

                    const onMove = (ev) => {
                        if (!resizing) return;
                        const dx = ev.clientX - startX;
                        const dy = ev.clientY - startY;

                        if (edge.includes('e')) winEl.style.width = Math.max(220, startW + dx) + 'px';
                        if (edge.includes('s')) winEl.style.height = Math.max(100, startH + dy) + 'px';
                        if (edge.includes('w')) {
                            const newW = Math.max(220, startW - dx);
                            winEl.style.width = newW + 'px';
                            winEl.style.left = (startLeft + (startW - newW)) + 'px';
                        }
                        if (edge.includes('n')) {
                            const newH = Math.max(100, startH - dy);
                            winEl.style.height = newH + 'px';
                            winEl.style.top = (startTop + (startH - newH)) + 'px';
                        }
                    };
                    const onUp = () => {
                        resizing = false;
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    };
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });
        }

        function bindWindowControls(winEl) {
            winEl.querySelectorAll('.title-bar-controls [data-action]').forEach(btn => {
                if (btn.dataset.actionBound === "true") return;
                btn.dataset.actionBound = "true";
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    if (action === 'minimize') minimizeWindow(winEl);
                    else if (action === 'maximize') toggleMaximize(winEl);
                    else if (action === 'close') closeWindow(winEl);
                });
            });
        }

        function initDraggableWindows() {
            const desktop = document.querySelector('.desktop');
            if (!desktop) return;
            desktop.classList.toggle('draggable-enabled', isDragEnabled());

            const windows = Array.from(document.querySelectorAll('.window'));
            windows.forEach((winEl, i) => {
                if (winEl.dataset.posInit !== "true") {
                    winEl.style.left = (40 + i * 40) + 'px';
                    winEl.style.top = (20 + i * 40) + 'px';
                    winEl.style.zIndex = String(10 + i);
                    winEl.dataset.posInit = "true";
                }
                makeDraggable(winEl);
                makeResizable(winEl);
                bindWindowControls(winEl);

                if (winEl.style.display !== 'none') {
                    ensureTaskbarButton(winEl);
                }
            });
        }

        function cascadeWindows() {
            const windows = Array.from(document.querySelectorAll('.window'))
                .filter(w => w.style.display !== 'none' && !w.classList.contains('minimized'));
            windows.forEach((winEl, i) => {
                winEl.classList.remove('maximized');
                winEl.style.left = (40 + i * 40) + 'px';
                winEl.style.top = (20 + i * 40) + 'px';
                bringToFront(winEl);
            });
        }

        function initTaskbarContextMenu() {
            const taskbar = document.getElementById('taskbar');
            if (!taskbar) return;

            const menu = document.createElement('div');
            menu.className = 'taskbar-context-menu';
            const cascadeBtn = document.createElement('button');
            cascadeBtn.textContent = 'Cascade Windows';
            cascadeBtn.type = 'button';
            cascadeBtn.addEventListener('click', () => {
                cascadeWindows();
                menu.classList.remove('show');
            });
            menu.appendChild(cascadeBtn);
            document.body.appendChild(menu);

            taskbar.addEventListener('contextmenu', (e) => {
                if (e.target.closest('.taskbar-item') || e.target.closest('.start-button') || e.target.closest('.system-tray')) return;
                e.preventDefault();
                menu.style.left = e.clientX + 'px';
                menu.style.top = Math.max(0, e.clientY - menu.offsetHeight) + 'px';
                menu.classList.add('show');
            });
            document.addEventListener('click', () => menu.classList.remove('show'));
        }

        window.addEventListener("DOMContentLoaded", () => {
            const saved = localStorage.getItem("preferredLang");
            setLanguage(saved || (navigator.language.startsWith("cs") ? "cs" : "en"));
            initClock();
            updateAlbums();
            initDraggableWindows();
            initTaskbarContextMenu();
            updateDiscord();
            setInterval(updateDiscord, 10000);
            window.addEventListener("resize", initDraggableWindows);

            // Remove any stray direct text nodes inside the system tray (keeps element children like #clock)
            const sysTray = document.querySelector('.system-tray');
            if (sysTray) {
                Array.from(sysTray.childNodes).forEach(n => {
                    if (n.nodeType === Node.TEXT_NODE) n.remove();
                });
            }
            // Ensure mute icon reflects saved state (we use provided .ico/.png assets)
            const muteBtn = document.getElementById('muteToggle');
            if (muteBtn) {
                const muteIcon = document.getElementById('muteIcon');
                const setIcon = () => {
                    const muted = localStorage.getItem('soundsMuted') === 'true';
                    if (muteIcon) muteIcon.src = muted ? 'images/icons/windows95/Mute%20volume.ico' : 'images/icons/windows95/speaker%20-%20volume.png';
                };
                setIcon();
            }

            // Rebuild system-tray contents using only known element nodes (prevents stray text insertion)
            if (sysTray) {
                const currentMute = document.getElementById('muteToggle');
                const currentClock = document.getElementById('clock');
                // detach elements to preserve listeners
                const muteNode = currentMute ? currentMute : null;
                const clockNode = currentClock ? currentClock : null;
                // clear and re-append only element nodes
                sysTray.innerHTML = '';
                if (muteNode) sysTray.appendChild(muteNode);
                if (clockNode) sysTray.appendChild(clockNode);

                // Also observe mutations and remove any non-element child that appears
                const mo = new MutationObserver(muts => {
                    muts.forEach(m => {
                        Array.from(sysTray.childNodes).forEach(n => { if (n.nodeType === Node.TEXT_NODE) n.remove(); });
                    });
                });
                mo.observe(sysTray, { childList: true, subtree: false });
            }

            const startBtn = document.getElementById("startButton");
            const startMenu = document.getElementById("startMenu");
            startBtn.onclick = e => {
                e.stopPropagation();
                startMenu.classList.toggle("active");
                startBtn.classList.toggle("active");
            };
            document.onclick = closeStartMenu;

            const mute = document.getElementById("muteToggle");
            const muteIcon = document.getElementById('muteIcon');
            const upUI = () => {
                const muted = localStorage.getItem("soundsMuted") === "true";
                if (mute) mute.style.opacity = muted ? "0.5" : "1";
                if (muteIcon) muteIcon.src = muted ? 'images/icons/windows95/Mute%20volume.ico' : 'images/icons/windows95/speaker%20-%20volume.png';
            };
            upUI();
            if (mute) mute.onclick = e => {
                e.stopPropagation();
                localStorage.setItem("soundsMuted", localStorage.getItem("soundsMuted") === "true" ? "false" : "true");
                upUI();
            };

            document.getElementById("game-postal").onclick = () => play(sndPostal);
            document.getElementById("game-css").onclick = () => play(sndCS);
        });
    </script>
</body>
